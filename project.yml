name: RandomApp
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  projectFormatVersion: "15.0"
targets:
  RandomApp:
    type: application
    platform: iOS
    sources: [Sources]
    resources: [Resources]
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.example.randomapp
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
        PROVISIONING_PROFILE_SPECIFIER: ""